info:
  name: Get Style
  type: http
  seq: 2

http:
  method: GET
  url: "{{TILESSERVICE_HOST}}:{{TILESSERVICE_PORT}}/v1/tiles/styles/:style"
  params:
    - name: style
      value: light
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
